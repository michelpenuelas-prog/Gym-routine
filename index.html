<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iron Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-principal: #0a0a0a;
            --bg-tarjeta: #141414;
            --bg-input: #1f1f1f;
            --accento: #ff4a4a; 
            --texto-blanco: #ffffff;
            --texto-gris: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding: 20px 16px;
            max-width: 480px; 
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accento);
        }

        .status {
            font-size: 11px;
            color: var(--texto-gris);
            background: #1c1c1e;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .seccion-titulo {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--texto-gris);
            margin-bottom: 12px;
            font-weight: 700;
        }

        /* Chips de Ejercicios de tu Rutina de Pierna */
        .chips-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .chips-container::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background-color: var(--bg-tarjeta);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid #222;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chip.active {
            background-color: var(--accento);
            color: white;
            border-color: var(--accento);
        }

        .tarjeta-registro {
            background-color: var(--bg-tarjeta);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1c1c1e;
            margin-bottom: 20px;
        }

        .ejercicio-actual-txt {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .grupo-badge {
            display: inline-block;
            font-size: 10px;
            background-color: #2c2c2e;
            color: var(--texto-gris);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .fila-inputs {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .grupo-input {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .grupo-input label {
            font-size: 11px;
            color: var(--texto-gris);
            font-weight: 600;
        }

        .grupo-input input {
            background-color: var(--bg-input);
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 16px;
            text-align: center;
            font-weight: 700;
        }

        .grupo-input input:focus {
            outline: none;
            border-color: var(--accento);
        }

        .input-notas {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn-registrar {
            background-color: var(--accento);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 74, 74, 0.2);
        }

        .btn-registrar:active {
            transform: scale(0.99);
        }

        .notificacion {
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
            color: #4cd964;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">IRON LOG<span>.</span></div>
        <div class="status" id="estado-sync">Conectado</div>
    </header>

    <div class="seccion-titulo">Tu Rutina de Pierna</div>
    <!-- Carga tus ejercicios reales -->
    <div class="chips-container" id="lista-ejercicios">
        <div class="chip active" onclick="seleccionar('Prensa', 'Pierna')">Prensa</div>
        <div class="chip" onclick="seleccionar('Patada en polea', 'Glúteo')">Patada Polea</div>
        <div class="chip" onclick="seleccionar('Extensión de cuadricep', 'Cuádriceps')">Extensiones</div>
        <div class="chip" onclick="seleccionar('Femoral acostado', 'Femoral')">Fem. Acostado</div>
        <div class="chip" onclick="seleccionar('Hip thrust', 'Glúteo')">Hip Thrust</div>
        <div class="chip" onclick="seleccionar('Peso muerto rumano', 'Femoral/Glúteo')">PM Rumano</div>
    </div>

    <div class="tarjeta-registro">
        <div class="ejercicio-actual-txt" id="ui-ejercicio">Prensa</div>
        <div class="grupo-badge" id="ui-grupo">Pierna</div>

        <form id="form-log" onsubmit="sincronizarFilaConSheets(event)">
            <div class="fila-inputs">
                <div class="grupo-input">
                    <label>SET</label>
                    <input type="number" id="input-set" value="1" required>
                </div>
                <div class="grupo-input">
                    <label>PESO (KG)</label>
                    <input type="number" id="input-peso" placeholder="0" required step="any">
                </div>
                <div class="grupo-input">
                    <label>REPS</label>
                    <input type="number" id="input-reps" placeholder="0" required>
                </div>
            </div>

            <div class="grupo-input" style="margin-bottom: 20px;">
                <label>NOTAS u OBSERVACIONES</label>
                <input type="text" id="input-notas" class="input-notas" placeholder="Ej: RIR 2, costó la última...">
            </div>

            <button type="submit" class="btn-registrar" id="btn-submit">GUARDAR EN LOGS</button>
        </form>
        <div class="notificacion" id="notificacion-ok">✓ Sincronizado en pestaña "Logs"</div>
    </div>

    <script>
        // COLOCA AQUÍ LA URL QUE TE DA GOOGLE APPS SCRIPT AL IMPLEMENTAR COMO APLICACIÓN WEB
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNtUz41IZL-XYgwD9oLZ3Wvz-B5jm9FQ8Sw-s7QZhM17csqlioC3GzTh_rHsDw529yng/exec";

        let ejercicioActual = "Prensa";
        let grupoActual = "Pierna";

        function seleccionar(ejercicio, grupo) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            
            ejercicioActual = ejercicio;
            grupoActual = grupo;
            
            document.getElementById('ui-ejercicio').innerText = ejercicio;
            document.getElementById('ui-grupo').innerText = grupo;
        }

        async function sincronizarFilaConSheets(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit');
            const status = document.getElementById('estado-sync');
            const notif = document.getElementById('notificacion-ok');

            const set = document.getElementById('input-set').value;
            const peso = document.getElementById('input-peso').value;
            const reps = document.getElementById('input-reps').value;
            const notas = document.getElementById('input-notas').value;
            const fecha = new Date().toISOString().split('T')[0]; // Formato YYYY-MM-DD

            btn.innerText = "SINCRONIZANDO...";
            btn.disabled = true;

            // Formateamos la fila exactamente como la espera tu "sheet.appendRow(row)" en el modo "sync"
            // Orden de las columnas según tu script: ["fecha","ejercicio","grupo","set","peso_kg","reps","notas"]
            const nuevaFila = [fecha, ejercicioActual, grupoActual, Number(set), Number(peso), Number(reps), notas];

            // Construimos el cuerpo JSON para que entre en la condición 'data.action === "sync"'
            const payload = {
                action: "sync",
                rows: [nuevaFila] // Enviamos la fila actual dentro del array rows
            };

            try {
                // Hacemos la petición HTTP POST a tu Apps Script con redirección configurada
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors", // Google Apps Script requiere modo no-cors si no manejas los encabezados de vuelta
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                // Como usamos no-cors, la respuesta será opaca, asumimos éxito si no salta al catch
                notif.style.display = "block";
                status.innerText = "Sincronizado ✓";
                status.style.color = "#4cd964";

                // Avanzar automáticamente al siguiente set
                document.getElementById('input-set').value = parseInt(set) + 1;
                document.getElementById('input-peso').value = "";
                document.getElementById('input-reps').value = "";
                document.getElementById('input-notas').value = "";

                setTimeout(() => { notif.style.display = "none"; }, 3000);

            } catch (error) {
                console.error(error);
                alert("Error al conectar con el servidor: " + error.message);
                status.innerText = "Error de conexión";
                status.style.color = "#ff4a4a";
            } finally {
                btn.innerText = "GUARDAR EN LOGS";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
